name: iOS Personal Training App Build

on:
  workflow_dispatch:
    inputs:
      app_env:
        description: Build environment passed as APP_ENV
        required: true
        default: production
        type: choice
        options:
          - production
          - staging

jobs:
  build-ios:
    runs-on: macos-15
    env:
      APP_DIR: app_repo/examples/personal_training_app
      IOS_BUNDLE_ID: com.simtrainingpartner.simtrainingpartner
      APPLE_TEAM_ID: 5QHDS9AQFB
      LANG: en_US.UTF-8
      LC_ALL: en_US.UTF-8
      COCOAPODS_DISABLE_STATS: "true"
      APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
      APP_STORE_CONNECT_KEY_IDENTIFIER: ${{ secrets.APP_STORE_CONNECT_KEY_IDENTIFIER }}
      APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
      APP_STORE_CONNECT_CERTIFICATE_KEY: ${{ secrets.APP_STORE_CONNECT_CERTIFICATE_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: main
          path: app_repo

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Preflight app path
        run: |
          pwd
          ls -la
          ls -la "$APP_DIR"
          test -f "$APP_DIR/pubspec.yaml"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Codemagic CLI tools
        run: |
          brew update
          brew install pipx
          pipx install codemagic-cli-tools
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Prepare iOS build directories
        run: |
          mkdir -p "$APP_DIR/build/ios/SourcePackages"

      - name: Ensure iOS scaffold files exist
        run: |
          cd "$APP_DIR"
          if [ ! -f ios/Podfile ]; then
            flutter create . --platforms=ios --org com.simtrainingpartner --project-name personal_training_app
          fi
          if ! grep -q "^platform :ios" ios/Podfile; then
            { echo "platform :ios, '15.0'"; cat ios/Podfile; } > ios/Podfile.tmp
            mv ios/Podfile.tmp ios/Podfile
          else
            sed -i '' "s/^platform :ios, '.*'/platform :ios, '15.0'/" ios/Podfile
          fi
          if ! grep -q "post_install do |installer|" ios/Podfile; then
            python3 - <<'PY'
from pathlib import Path
podfile = Path('ios/Podfile')
content = podfile.read_text()
insertion = """

post_install do |installer|
  installer.pods_project.targets.each do |target|
    target.build_configurations.each do |config|
      config.build_settings['IPHONEOS_DEPLOYMENT_TARGET'] = '15.0'
    end
  end
end
"""
content = content.rstrip()
if content.endswith('end'):
    content = content[:-3].rstrip() + insertion + "\nend\n"
else:
    content += insertion + "\n"
podfile.write_text(content)
PY
          fi

      - name: Normalize iOS deployment target
        run: |
          cd "$APP_DIR"
          sed -i '' "s/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]\+;/IPHONEOS_DEPLOYMENT_TARGET = 15.0;/g" ios/Runner.xcodeproj/project.pbxproj

      - name: Set up iOS signing
        run: |
          cd "$APP_DIR"
          if [ -z "$APP_STORE_CONNECT_CERTIFICATE_KEY" ]; then
            echo "Missing secret: APP_STORE_CONNECT_CERTIFICATE_KEY"
            exit 1
          fi
          printf "%s" "$APP_STORE_CONNECT_CERTIFICATE_KEY" > "$RUNNER_TEMP/cert_key"
          keychain initialize
          app-store-connect fetch-signing-files \
            "$IOS_BUNDLE_ID" \
            --platform IOS \
            --type IOS_APP_STORE \
            --certificate-key=@file:"$RUNNER_TEMP/cert_key" \
            --create
          keychain add-certificates
          xcode-project use-profiles

      - name: Flutter pub get
        run: |
          cd "$APP_DIR"
          flutter pub get

      - name: Resolve CocoaPods dependencies
        run: |
          cd "$APP_DIR/ios"
          pod repo update
          pod install --repo-update

      - name: Build iOS IPA for App Store
        run: |
          cd "$APP_DIR"
          flutter config --no-enable-swift-package-manager
          flutter build ipa \
            --release \
            --no-codesign \
            --dart-define=APP_ENV=${{ inputs.app_env }} \
            --export-options-plist=$HOME/export_options.plist

          xcodebuild -exportArchive \
            -archivePath "$APP_DIR/build/ios/archive/Runner.xcarchive" \
            -exportPath "$APP_DIR/build/ios/ipa" \
            -exportOptionsPlist "$HOME/export_options.plist"

      - name: Upload iOS IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-app-ipa-${{ inputs.app_env }}
          path: app_repo/examples/personal_training_app/build/ios/ipa/*.ipa
          if-no-files-found: error