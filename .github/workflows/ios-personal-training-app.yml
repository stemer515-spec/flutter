name: iOS Personal Training App Build

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      app_env:
        description: Build environment passed as APP_ENV
        required: true
        default: production
        type: choice
        options:
          - production
          - staging

jobs:
  build-ios:
    runs-on: macos-15
    env:
      APP_DIR: app_repo/examples/personal_training_app
      APP_ENV: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.app_env || 'production' }}
      IOS_BUNDLE_ID: com.simtrainingpartner.simtrainingpartner
      APPLE_TEAM_ID: 5QHDS9AQFB
      LANG: en_US.UTF-8
      LC_ALL: en_US.UTF-8
      COCOAPODS_DISABLE_STATS: "true"
      APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
      APP_STORE_CONNECT_KEY_IDENTIFIER: ${{ secrets.APP_STORE_CONNECT_KEY_IDENTIFIER }}
      APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
      APP_STORE_CONNECT_CERTIFICATE_KEY: ${{ secrets.APP_STORE_CONNECT_CERTIFICATE_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: main
          path: app_repo

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Preflight app path
        run: |
          pwd
          ls -la
          ls -la "$APP_DIR"
          test -f "$APP_DIR/pubspec.yaml"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Codemagic CLI tools
        run: |
          brew update
          brew install pipx
          pipx install codemagic-cli-tools
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Prepare iOS build directories
        run: |
          mkdir -p "$APP_DIR/build/ios/SourcePackages"

      - name: Normalize iOS deployment target
        run: |
          cd "$APP_DIR"
          # Keep framework linkage so Swift bridge headers (for example health-Swift.h)
          # are generated, but remove modular headers to avoid Flutter header issues.
          if ! grep -q "^[[:space:]]*use_frameworks![[:space:]]*$" ios/Podfile; then
            perl -0pi -e "s/target 'Runner' do/target 'Runner' do\\n  use_frameworks!/" ios/Podfile
          fi
          sed -i '' '/^[[:space:]]*use_modular_headers![[:space:]]*$/d' ios/Podfile
          if ! grep -q "flutter_additional_ios_build_settings(target)" ios/Podfile; then
            perl -0pi -e "s/installer\\.pods_project\\.targets\\.each do \\|target\\|/installer.pods_project.targets.each do |target|\\n    flutter_additional_ios_build_settings(target)/" ios/Podfile
          fi
          sed -i '' "s/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]\+;/IPHONEOS_DEPLOYMENT_TARGET = 15.0;/g" ios/Runner.xcodeproj/project.pbxproj

      - name: Set up iOS signing
        run: |
          cd "$APP_DIR"
          if [ -z "$APP_STORE_CONNECT_CERTIFICATE_KEY" ]; then
            echo "Missing secret: APP_STORE_CONNECT_CERTIFICATE_KEY"
            exit 1
          fi
          printf "%s" "$APP_STORE_CONNECT_CERTIFICATE_KEY" > "$RUNNER_TEMP/cert_key"
          keychain initialize
          app-store-connect fetch-signing-files \
            "$IOS_BUNDLE_ID" \
            --platform IOS \
            --type IOS_APP_STORE \
            --certificate-key=@file:"$RUNNER_TEMP/cert_key" \
            --create
          keychain add-certificates
          xcode-project use-profiles

      - name: Flutter pub get
        run: |
          cd "$APP_DIR"
          flutter pub get

      - name: Resolve FirebaseService import collision
        run: |
          cd "$APP_DIR"
          if [ -f lib/main.dart ]; then
            # Hide FirebaseService from firebase_core and explicitly alias the app service.
            perl -0pi -e "s#import 'package:firebase_core/firebase_core.dart';#import 'package:firebase_core/firebase_core.dart' hide FirebaseService;#g" lib/main.dart
            perl -0pi -e "s#import 'package:personal_training_app/utils/firebase_service.dart';#import 'package:personal_training_app/utils/firebase_service.dart' as app_firebase;#g" lib/main.dart
            perl -0pi -e "s/(?<![A-Za-z0-9_\.])FirebaseService\./app_firebase.FirebaseService./g" lib/main.dart
            echo "==== Firebase imports after patch ===="
            grep -nE "firebase_core/firebase_core.dart|utils/firebase_service.dart" lib/main.dart || true
            echo "==== FirebaseService usage after patch ===="
            grep -n "FirebaseService\." lib/main.dart || true
          fi

      - name: Resolve CocoaPods dependencies
        run: |
          cd "$APP_DIR/ios"
          pod repo update
          pod install --repo-update
          # Some transitive pods (for example BoringSSL-GRPC) may default to old
          # deployment targets; normalize after install.
          sed -i '' "s/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]\+;/IPHONEOS_DEPLOYMENT_TARGET = 15.0;/g" Pods/Pods.xcodeproj/project.pbxproj

      - name: Build iOS IPA for App Store
        run: |
          set -euo pipefail
          cd "$APP_DIR"
          flutter config --no-enable-swift-package-manager
          if ! xcodebuild archive \
            -workspace "ios/Runner.xcworkspace" \
            -scheme Runner \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "build/ios/archive/Runner.xcarchive" \
            -allowProvisioningUpdates \
            | tee "$RUNNER_TEMP/xcodebuild-archive.log"; then
            echo "==== xcodebuild archive error lines ===="
            grep -niE "error:|error |fatal|exception|failed" "$RUNNER_TEMP/xcodebuild-archive.log" || true
            echo "==== xcodebuild archive tail ===="
            tail -n 600 "$RUNNER_TEMP/xcodebuild-archive.log" || true
            exit 1
          fi

          if ! xcodebuild -exportArchive \
            -archivePath "build/ios/archive/Runner.xcarchive" \
            -exportPath "build/ios/ipa" \
            -exportOptionsPlist "$HOME/export_options.plist" \
            | tee "$RUNNER_TEMP/xcodebuild-export.log"; then
            echo "==== xcodebuild export error lines ===="
            grep -niE "error:|error |fatal|exception|failed" "$RUNNER_TEMP/xcodebuild-export.log" || true
            echo "==== xcodebuild export tail ===="
            tail -n 600 "$RUNNER_TEMP/xcodebuild-export.log" || true
            exit 1
          fi

      - name: Upload xcodebuild logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-logs-${{ env.APP_ENV }}
          path: |
            ${{ runner.temp }}/xcodebuild-archive.log
            ${{ runner.temp }}/xcodebuild-export.log
          if-no-files-found: ignore

      - name: Upload iOS IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-app-ipa-${{ env.APP_ENV }}
          path: app_repo/examples/personal_training_app/build/ios/ipa/*.ipa
          if-no-files-found: error