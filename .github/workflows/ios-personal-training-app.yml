name: iOS Personal Training App Build

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      app_env:
        description: Build environment passed as APP_ENV
        required: true
        default: production
        type: choice
        options:
          - production
          - staging
      upload_to_testflight:
        description: Upload IPA to TestFlight after successful build
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  build-ios:
    runs-on: macos-15
    env:
      APP_DIR: app_repo/examples/personal_training_app
      APP_ENV: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.app_env || 'production' }}
      IOS_BUNDLE_ID: com.simtrainingpartner.simtrainingpartner
      APPLE_TEAM_ID: 5QHDS9AQFB
      LANG: en_US.UTF-8
      LC_ALL: en_US.UTF-8
      COCOAPODS_DISABLE_STATS: "true"
      APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
      APP_STORE_CONNECT_KEY_IDENTIFIER: ${{ secrets.APPLE_STORE_CONNECT_API_KEY_ID || secrets.APP_STORE_CONNECT_KEY_IDENTIFIER }}
      APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
      APPLE_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APPLE_STORE_CONNECT_API_KEY_BASE64 }}
      UPLOAD_TO_TESTFLIGHT: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.upload_to_testflight || secrets.UPLOAD_TO_TESTFLIGHT }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: main
          path: app_repo

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Preflight app path
        run: |
          pwd
          ls -la
          ls -la "$APP_DIR"
          test -f "$APP_DIR/pubspec.yaml"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Codemagic CLI tools
        run: |
          brew update
          brew install pipx
          pipx install codemagic-cli-tools
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Prepare iOS build directories
        run: |
          mkdir -p "$APP_DIR/build/ios/SourcePackages"

      - name: Normalize iOS deployment target
        run: |
          cd "$APP_DIR"
          # Keep Podfile linkage mode from source branch to avoid CI-only drift.
          if ! grep -q "flutter_additional_ios_build_settings(target)" ios/Podfile; then
            perl -0pi -e "s/installer\\.pods_project\\.targets\\.each do \\|target\\|/installer.pods_project.targets.each do |target|\\n    flutter_additional_ios_build_settings(target)/" ios/Podfile
          fi
          sed -i '' "s/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]\+;/IPHONEOS_DEPLOYMENT_TARGET = 15.0;/g" ios/Runner.xcodeproj/project.pbxproj

      - name: Prepare export options
        run: |
          cat > "$HOME/export_options.plist" << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>signingStyle</key>
            <string>automatic</string>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>uploadBitcode</key>
            <false/>
          </dict>
          </plist>
          EOF

      - name: Set up App Store Connect API key for xcodebuild
        run: |
          set -euo pipefail
          if [ -z "${APP_STORE_CONNECT_ISSUER_ID:-}" ]; then
            echo "Missing secret: APP_STORE_CONNECT_ISSUER_ID"
            exit 1
          fi
          if [ -z "${APP_STORE_CONNECT_KEY_IDENTIFIER:-}" ]; then
            echo "Missing secret: APP_STORE_CONNECT_KEY_IDENTIFIER (or APPLE_STORE_CONNECT_API_KEY_ID)"
            exit 1
          fi

          key_path="$RUNNER_TEMP/AuthKey_${APP_STORE_CONNECT_KEY_IDENTIFIER}.p8"
          valid_key=false
          if [ -n "${APPLE_STORE_CONNECT_API_KEY_BASE64:-}" ]; then
            if printf "%s" "$APPLE_STORE_CONNECT_API_KEY_BASE64" | base64 --decode > "$key_path" 2>/dev/null; then
              if grep -q "BEGIN PRIVATE KEY" "$key_path"; then
                valid_key=true
              fi
            fi
          fi

          if [ "$valid_key" != "true" ] && [ -n "${APP_STORE_CONNECT_PRIVATE_KEY:-}" ]; then
            printf "%s" "$APP_STORE_CONNECT_PRIVATE_KEY" | sed 's/\\n/\n/g' > "$key_path"
            if grep -q "BEGIN PRIVATE KEY" "$key_path"; then
              valid_key=true
            fi
          fi

          if [ "$valid_key" != "true" ]; then
            echo "Unable to build a valid .p8 key from APPLE_STORE_CONNECT_API_KEY_BASE64 or APP_STORE_CONNECT_PRIVATE_KEY"
            exit 1
          fi

          chmod 600 "$key_path"
          if ! openssl pkey -in "$key_path" -noout >/dev/null 2>&1; then
            echo "Generated key file is not a valid private key"
            exit 1
          fi
          echo "APP_STORE_CONNECT_API_KEY_PATH=$key_path" >> "$GITHUB_ENV"

      - name: Flutter pub get
        run: |
          cd "$APP_DIR"
          flutter pub get

      - name: Resolve FirebaseService import collision
        run: |
          cd "$APP_DIR"
          if [ -f lib/main.dart ]; then
            # Keep app service usage as FirebaseService.* and only hide conflicting
            # symbol from firebase_core. Match both single/double quote import styles.
            perl -0pi -e "s#import\s+['\"]package:firebase_core/firebase_core\.dart['\"];#import 'package:firebase_core/firebase_core.dart' hide FirebaseService;#g" lib/main.dart
            perl -0pi -e "s#app_firebase\.FirebaseService\.#FirebaseService.#g" lib/main.dart
            echo "==== Firebase imports after patch ===="
            grep -nE "firebase_core/firebase_core.dart|utils/firebase_service.dart" lib/main.dart || true
            echo "==== FirebaseService usage after patch ===="
            grep -n "FirebaseService\." lib/main.dart || true
          fi

      - name: Resolve CocoaPods dependencies
        run: |
          cd "$APP_DIR"
          # Ensure iOS plugin podspec symlinks and generated configs exist before pod install.
          flutter build ios --config-only --no-codesign

          # FlutterGeneratedPluginSwiftPackage may default to iOS 13 in CI, while
          # Firebase Swift package products now require iOS 15.
          find ios -path "*FlutterGeneratedPluginSwiftPackage*/Package.swift" -type f -print | while read -r pkg; do
            sed -i '' -E "s/\.iOS\(\"13\.0\"\)/.iOS(\"15.0\")/g; s/\.iOS\(\.v13\)/.iOS(.v15)/g" "$pkg"
            echo "==== Patched Swift package platform in $pkg ===="
            grep -nE "platforms|\.iOS" "$pkg" || true
          done

          cd ios
          pod repo update
          pod install --repo-update
          echo "==== Patching health Swift header import ===="
          for f in ".symlinks/plugins/health/ios/Classes/HealthPlugin.m" "$HOME/.pub-cache/hosted/pub.dev"/health-*/ios/Classes/HealthPlugin.m; do
            if [ -f "$f" ]; then
              perl -0pi -e "s/#import <health\/health-Swift\.h>/#if __has_include(<health\/health-Swift.h>)\\n#import <health\/health-Swift.h>\\n#elif __has_include(\"health-Swift.h\")\\n#import \"health-Swift.h\"\\n#else\\n#import <health-Swift.h>\\n#endif/g" "$f"
              echo "Patched: $f"
              grep -nE "health-Swift\.h|__has_include" "$f" || true
            fi
          done
          echo "==== Plugin symlink check ===="
          ls -la .symlinks/plugins | grep -E "cloud_firestore|firebase_core|firebase_auth" || true
          echo "==== cloud_firestore target support files ===="
          ls -la "Pods/Target Support Files" | grep -i cloud_firestore || true
          echo "==== Firestore header locations in Pods ===="
          find Pods -name FLTFirebaseFirestorePlugin.h -print || true
          # Some transitive pods (for example BoringSSL-GRPC) may default to old
          # deployment targets; normalize after install.
          sed -i '' "s/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]\+;/IPHONEOS_DEPLOYMENT_TARGET = 15.0;/g" Pods/Pods.xcodeproj/project.pbxproj

      - name: Build iOS IPA for App Store
        run: |
          set -euo pipefail
          cd "$APP_DIR"
          : > "$RUNNER_TEMP/xcodebuild-archive.log"
          : > "$RUNNER_TEMP/xcodebuild-export.log"

          # This flag may not be available on every Flutter toolchain version.
          flutter config --no-enable-swift-package-manager || true

          if [ ! -f "$APP_STORE_CONNECT_API_KEY_PATH" ]; then
            echo "App Store Connect API key file not found at: $APP_STORE_CONNECT_API_KEY_PATH"
            exit 1
          fi

          if ! xcodebuild archive \
            -workspace "ios/Runner.xcworkspace" \
            -scheme Runner \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "build/ios/archive/Runner.xcarchive" \
            -authenticationKeyPath "$APP_STORE_CONNECT_API_KEY_PATH" \
            -authenticationKeyID "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID" \
            -allowProvisioningUpdates \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CODE_SIGN_STYLE=Automatic \
            2>&1 | tee "$RUNNER_TEMP/xcodebuild-archive.log"; then
            echo "==== xcodebuild archive error lines ===="
            grep -niE "(^|[^A-Za-z])(fatal error:|error:|\*\* ARCHIVE FAILED \*\*|Command PhaseScriptExecution failed)" "$RUNNER_TEMP/xcodebuild-archive.log" || true
            echo "==== xcodebuild archive failure context ===="
            awk 'BEGIN{p=0} /\*\* ARCHIVE FAILED \*\*/{p=120} p>0{print; p--}' "$RUNNER_TEMP/xcodebuild-archive.log" || true
            echo "==== xcodebuild archive tail ===="
            tail -n 600 "$RUNNER_TEMP/xcodebuild-archive.log" || true
            exit 1
          fi

          if ! xcodebuild -exportArchive \
            -archivePath "build/ios/archive/Runner.xcarchive" \
            -exportPath "build/ios/ipa" \
            -exportOptionsPlist "$HOME/export_options.plist" \
            -authenticationKeyPath "$APP_STORE_CONNECT_API_KEY_PATH" \
            -authenticationKeyID "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CODE_SIGN_STYLE=Automatic \
            2>&1 | tee "$RUNNER_TEMP/xcodebuild-export.log"; then
            echo "==== xcodebuild export error lines ===="
            grep -niE "(^|[^A-Za-z])(fatal error:|error:|\*\* EXPORT FAILED \*\*|Command PhaseScriptExecution failed)" "$RUNNER_TEMP/xcodebuild-export.log" || true
            echo "==== xcodebuild export failure context ===="
            awk 'BEGIN{p=0} /\*\* EXPORT FAILED \*\*/{p=120} p>0{print; p--}' "$RUNNER_TEMP/xcodebuild-export.log" || true
            echo "==== xcodebuild export tail ===="
            tail -n 600 "$RUNNER_TEMP/xcodebuild-export.log" || true
            exit 1
          fi

      - name: Summarize xcodebuild failures
        if: always()
        run: |
          summary_log="$RUNNER_TEMP/xcodebuild-failure-summary.log"
          : > "$summary_log"

          for f in "$RUNNER_TEMP/xcodebuild-archive.log" "$RUNNER_TEMP/xcodebuild-export.log"; do
            if [ -f "$f" ]; then
              echo "==== $(basename "$f") ====" >> "$summary_log"
              grep -niE "(^|[^A-Za-z])(fatal error:|error:|\*\* ARCHIVE FAILED \*\*|\*\* EXPORT FAILED \*\*|Command PhaseScriptExecution failed)" "$f" | head -n 160 >> "$summary_log" || true
              awk 'BEGIN{p=0} /\*\* ARCHIVE FAILED \*\*/{p=120} /\*\* EXPORT FAILED \*\*/{p=120} p>0{print; p--}' "$f" >> "$summary_log" || true
              echo >> "$summary_log"
            fi
          done

          if [ -s "$summary_log" ]; then
            echo "==== Extracted xcodebuild failure lines ===="
            cat "$summary_log"
            {
              echo "## Extracted xcodebuild failure lines"
              echo
              echo '```text'
              cat "$summary_log"
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No extracted xcodebuild failure lines were found."
          fi

      - name: Upload xcodebuild logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-logs-${{ env.APP_ENV }}
          path: |
            ${{ runner.temp }}/xcodebuild-archive.log
            ${{ runner.temp }}/xcodebuild-export.log
          if-no-files-found: ignore

      - name: Upload iOS IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-app-ipa-${{ env.APP_ENV }}
          path: app_repo/examples/personal_training_app/build/ios/ipa/*.ipa
          if-no-files-found: error

      - name: Report TestFlight upload mode
        run: |
          echo "UPLOAD_TO_TESTFLIGHT=${UPLOAD_TO_TESTFLIGHT:-unset}"
          if [ "${UPLOAD_TO_TESTFLIGHT:-false}" = "true" ]; then
            echo "TestFlight upload is ENABLED for this run."
          else
            echo "TestFlight upload is DISABLED for this run."
          fi

      - name: Upload IPA to TestFlight
        if: ${{ env.UPLOAD_TO_TESTFLIGHT == 'true' }}
        run: |
          cd "$APP_DIR"
          ipa_path=$(ls build/ios/ipa/*.ipa | head -n 1)
          if [ -z "$ipa_path" ]; then
            echo "No IPA found to upload."
            exit 1
          fi

          echo "Uploading $ipa_path to App Store Connect..."
          app-store-connect publish \
            --path "$ipa_path"