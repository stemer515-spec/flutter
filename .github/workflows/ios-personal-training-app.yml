name: iOS Personal Training App Build

on:
  workflow_dispatch:
    inputs:
      app_env:
        description: Build environment passed as APP_ENV
        required: true
        default: production
        type: choice
        options:
          - production
          - staging

jobs:
  build-ios:
    runs-on: macos-14
    env:
      APP_DIR: app_repo/examples/personal_training_app
      IOS_BUNDLE_ID: com.simtrainingpartner.simtrainingpartner
      APPLE_TEAM_ID: 5QHDS9AQFB
      LANG: en_US.UTF-8
      LC_ALL: en_US.UTF-8
      COCOAPODS_DISABLE_STATS: "true"
      IOS_DISTRIBUTION_CERTIFICATE_BASE64: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_BASE64 }}
      IOS_DISTRIBUTION_CERTIFICATE_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_CERTIFICATE_PASSWORD }}
      IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: main
          path: app_repo

      - name: Preflight app path
        run: |
          pwd
          ls -la
          ls -la "$APP_DIR"
          test -f "$APP_DIR/pubspec.yaml"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Prepare iOS build directories
        run: |
          mkdir -p "$APP_DIR/build/ios/SourcePackages"

      - name: Ensure iOS scaffold files exist
        run: |
          cd "$APP_DIR"
          if [ ! -f ios/Podfile ]; then
            flutter create . --platforms=ios --org com.simtrainingpartner --project-name personal_training_app
          fi
          if ! grep -q "^platform :ios" ios/Podfile; then
            { echo "platform :ios, '13.0'"; cat ios/Podfile; } > ios/Podfile.tmp
            mv ios/Podfile.tmp ios/Podfile
          fi

      - name: Set up iOS signing
        run: |
          cd "$APP_DIR"
          if [ -z "$IOS_DISTRIBUTION_CERTIFICATE_BASE64" ] || [ -z "$IOS_DISTRIBUTION_CERTIFICATE_PASSWORD" ] || [ -z "$IOS_PROVISIONING_PROFILE_BASE64" ]; then
            echo "Missing one or more signing secrets: IOS_DISTRIBUTION_CERTIFICATE_BASE64, IOS_DISTRIBUTION_CERTIFICATE_PASSWORD, IOS_PROVISIONING_PROFILE_BASE64"
            exit 1
          fi
          KEYCHAIN_PATH="$RUNNER_TEMP/build-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 24)"

          echo "$IOS_DISTRIBUTION_CERTIFICATE_BASE64" | base64 -D > "$RUNNER_TEMP/certificate.p12"
          echo "$IOS_PROVISIONING_PROFILE_BASE64" | base64 -D > "$RUNNER_TEMP/profile.mobileprovision"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db
          security default-keychain -d user -s "$KEYCHAIN_PATH"

          security import "$RUNNER_TEMP/certificate.p12" -k "$KEYCHAIN_PATH" -P "$IOS_DISTRIBUTION_CERTIFICATE_PASSWORD" -A
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$RUNNER_TEMP/profile.mobileprovision" "$HOME/Library/MobileDevice/Provisioning Profiles/"

          # Ensure team is explicitly set for the Runner target when missing.
          if ! grep -q "DEVELOPMENT_TEAM = $APPLE_TEAM_ID;" ios/Runner.xcodeproj/project.pbxproj; then
            sed -i '' "s/PRODUCT_BUNDLE_IDENTIFIER = $IOS_BUNDLE_ID;/DEVELOPMENT_TEAM = $APPLE_TEAM_ID;\
				PRODUCT_BUNDLE_IDENTIFIER = $IOS_BUNDLE_ID;/g" ios/Runner.xcodeproj/project.pbxproj
          fi

      - name: Flutter pub get
        run: |
          cd "$APP_DIR"
          flutter pub get

      - name: Resolve CocoaPods dependencies
        run: |
          cd "$APP_DIR/ios"
          pod repo update
          pod install --repo-update

      - name: Build iOS IPA for App Store
        run: |
          cd "$APP_DIR"
          flutter config --no-enable-swift-package-manager
          flutter build ipa \
            --release \
            --dart-define=APP_ENV=${{ inputs.app_env }} \
            --export-options-plist=$HOME/export_options.plist

      - name: Upload iOS IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-app-ipa-${{ inputs.app_env }}
          path: app_repo/examples/personal_training_app/build/ios/ipa/*.ipa
          if-no-files-found: error