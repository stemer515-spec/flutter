name: iOS Personal Training App Build

on:
  workflow_dispatch:
    inputs:
      app_env:
        description: Build environment passed as APP_ENV
        required: true
        default: production
        type: choice
        options:
          - production
          - staging

jobs:
  build-ios:
    runs-on: macos-14
    env:
      APP_DIR: app_repo/examples/personal_training_app

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: main
          path: app_repo

      - name: Preflight app path
        run: |
          pwd
          ls -la
          ls -la "$APP_DIR"
          test -f "$APP_DIR/pubspec.yaml"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Prepare iOS build directories
        run: |
          mkdir -p "$APP_DIR/build/ios/SourcePackages"

      - name: Flutter pub get
        run: |
          cd "$APP_DIR"
          flutter pub get

      - name: Build iOS IPA for App Store
        run: |
          cd "$APP_DIR"
          flutter build ipa \
            --release \
            --dart-define=APP_ENV=${{ inputs.app_env }} \
            --export-options-plist=ios/ExportOptions-AppStore.plist

      - name: Upload iOS IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-app-ipa-${{ inputs.app_env }}
          path: app_repo/examples/personal_training_app/build/ios/ipa/*.ipa
          if-no-files-found: error
